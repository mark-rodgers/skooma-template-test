<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello, World!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .hero h1 {
      font-size: 4rem;
      font-weight: 700;
    }

    .meme {
      width: 500px;
      height: 500px;
    }
  </style>
</head>

<body>
  <div class="hero">
    <h1>Hello, World!</h1>
    <p>Repo URL: {{.RepoURL}}</p>
    <p>Author: {{.Author}}</p>
    <img src="./assets/test.webp" alt="Test" class="meme">
  </div>
</body>

</html>
